container:
  dockerfile: Dockerfile

env:
  GOPROXY: https://proxy.golang.org
  GO111MODULE: on

test_task:
  modules_cache:
    fingerprint_script: cat go.sum
    folder: $GOPATH/pkg/mod
  build_script: go build -v ./...
  test_script: go test -v ./...
  build_googleipmi_script: go build -C ./tpm2/transport/googleipmi/ -v ./...
  test_googleipmi_script: go test -C ./tpm2/transport/googleipmi/ -v ./...

lint_task:
  env:
    matrix:
      - GOOS: linux
      - GOOS: windows
  lint_script:
    golangci-lint run ./tpmutil/... ./tpm2/...
  lint_googleipmi_script: |
    if [ "$GOOS" = "linux" ]; then
      cd ./tpm2/transport/googleipmi/
      golangci-lint run ./...
    fi
